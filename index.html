<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVRdevelopment - Master System Final Status Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2980b9; --secondary: #27ae60; --danger: #e74c3c; --warning: #f39c12; --bg: #f4f7f6; --dark: #2c3e50; --permit: #8e44ad; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; font-size: 13px; }
        .container { max-width: 1550px; margin: auto; display: none; }
        #loginOverlay { position: fixed; inset: 0; background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 5px solid #ddd; }
        .label { font-size: 0.8em; color: #666; display: block; margin-bottom: 3px; font-weight: bold; }
        .val { font-weight: bold; color: var(--primary); display: block; font-size: 14px; }
        button { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--secondary); color: white; }
        .btn-red { background: var(--danger); color: white; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: 'Sarabun'; width: 100%; box-sizing: border-box; }
        .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin: 15px 0; }
        .summary-item { background: #eef2f7; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #d0dae5; }
        .route-card { border-radius: 8px; padding: 15px; margin-top: 15px; border: 1px solid #d1d8e0; background: #fff; position: relative; }
        .grid-p1-compare { display: grid; grid-template-columns: 1fr 1fr 1.2fr 1fr 1.2fr; gap: 10px; background: #fdfefe; padding: 12px; border-radius: 8px; margin: 10px 0; border: 1px solid #e0e6ed; }
        .exp-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .exp-table td, .exp-table th { padding: 8px; border-bottom: 1px solid #eee; text-align: left; }
        .inline-input { border: 1px solid transparent; background: transparent; font-family: 'Sarabun'; font-weight: bold; color: inherit; }
        .inline-input:focus { border: 1px solid var(--primary); background: #fff; outline: none; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h1>Hello KVRdevelopment</h1>
        <p>ระบุรหัสผ่านเพื่อเข้าใช้งาน</p>
        <input type="text" id="passInput" placeholder="ใส่ password" 
               autocorrect="off" autocapitalize="off" spellcheck="false"
               onkeyup="if(event.key==='Enter') checkPass()" 
               style="margin-bottom: 15px; text-align: center; font-weight: bold; color: var(--primary); font-size: 18px;">
        <button class="btn-blue" onclick="checkPass()">เข้าใช้งาน</button>
    </div>
</div>

<div class="container" id="mainContent">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="color: var(--dark); margin:0;">🏗️ KVRdevelopment System</h2>
        <button onclick="logout()" style="background:#7f8c8d; color:white;">ออกจากระบบ</button>
    </div>

    <div class="card" style="border-top: 5px solid var(--dark);">
        <h3 style="margin-top:0;">➕ สร้างโครงการใหม่</h3>
        <div style="display: grid; grid-template-columns: 0.7fr 1.5fr 1.2fr 1.2fr 1fr 0.8fr 0.8fr auto; gap: 10px; margin-bottom: 15px;">
            <div><span class="label">ประเภท</span><select id="pType"><option value="normal">งานปกติ</option><option value="openend">งาน Open-end</option></select></div>
            <div><span class="label">ชื่อโครงการ</span><input type="text" id="pName" placeholder="ชื่อโครงการ" onkeyup="if(event.key==='Enter') addProject()"></div>
            <div><span class="label">สาขา กปน.</span>
                <select id="pBranch">
                    <option value="">เลือกสาขา...</option>
                    <option value="แม้นศรี">แม้นศรี</option><option value="พญาไท">พญาไท</option><option value="นนทบุรี">นนทบุรี</option>
                    <option value="สมุทรปราการ">สมุทรปราการ</option><option value="พระโขนง">พระโขนง</option><option value="ทุ่งมหาเมฆ">ทุ่งมหาเมฆ</option>
                    <option value="ลาดพร้าว">ลาดพร้าว</option><option value="ประชาชื่น">ประชาชื่น</option><option value="สุขสวัสดิ์">สุขสวัสดิ์</option>
                    <option value="ตากสิน">ตากสิน</option><option value="บางกอกน้อย">บางกอกน้อย</option><option value="ภาษีเจริญ">ภาษีเจริญ</option>
                    <option value="บางบัวทอง">บางบัวทอง</option><option value="มหาสวัสดิ์">มหาสวัสดิ์</option><option value="สุวรรณภูมิ">สุวรรณภูมิ</option>
                    <option value="มีนบุรี">มีนบุรี</option><option value="แจ้งวัฒนะ">แจ้งวัฒนะ</option><option value="บางเขน">บางเขน</option>
                </select>
            </div>
            <div><span class="label">กองงาน</span><input type="text" id="pDept" placeholder="ระบุกองงาน" onkeyup="if(event.key==='Enter') addProject()"></div>
            <div><span class="label">สัญญา (VAT)</span><input type="text" id="pContractVat" placeholder="0" oninput="formatInput(this)" onkeyup="if(event.key==='Enter') addProject()"></div>
            <div><span class="label">% เป้าหมาย</span><input type="number" id="pCostPercent" value="70" onkeyup="if(event.key==='Enter') addProject()"></div>
            <div><span class="label">รวม (เมตร)</span><input type="number" id="pTotalDist" placeholder="0" onkeyup="if(event.key==='Enter') addProject()"></div>
            <div style="align-self: end;"><button class="btn-blue" onclick="addProject()">สร้าง</button></div>
        </div>
    </div>

    <div id="projectList"></div>
</div>

<script>
    const SECRET_PASS = "kvradmin";
    const categories = ["ค่าแรง", "ค่าคอนกรีต", "ค่า asbuilt", "ค่าช่างคุมงาน", "ค่า ผจ.", "ค่า Food support", "ค่าตรวจรับงาน"];
    const statuses = ["เตรียมจ่าย", "จ่ายแล้ว", "บันทึกลง flowaccount แล้ว"];
    const routeStatuses = ["ยังไม่เริ่มงาน", "กำลังดำเนินการ", "รอใบอนุญาต", "ได้รับใบอนุญาตแล้ว", "วางท่อเสร็จสิ้น", "ส่งมอบงานแล้ว", "ระงับการดำเนินการ"];
    const branchOptions = ["แม้นศรี", "พญาไท", "นนทบุรี", "สมุทรปราการ", "พระโขนง", "ทุ่งมหาเมฆ", "ลาดพร้าว", "ประชาชื่น", "สุขสวัสดิ์", "ตากสิน", "บางกอกน้อย", "ภาษีเจริญ", "บางบัวทอง", "มหาสวัสดิ์", "สุวรรณภูมิ", "มีนบุรี", "แจ้งวัฒนะ", "บางเขน"];

    let projects = JSON.parse(localStorage.getItem('kvr_master_v21')) || [];

    // --- Smart Login ---
    window.onload = function() {
        const lastLogin = localStorage.getItem('kvr_session');
        if (lastLogin && (new Date().getTime() - lastLogin) / 60000 < 10) showApp();
    };
    function checkPass() {
        if(document.getElementById('passInput').value === SECRET_PASS) showApp();
        else alert("รหัสผ่านไม่ถูกต้อง");
    }
    function showApp() {
        localStorage.setItem('kvr_session', new Date().getTime());
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        render();
    }
    function logout() { localStorage.removeItem('kvr_session'); location.reload(); }

    // --- Helpers ---
    function formatInput(el) {
        let val = el.value.replace(/,/g, '');
        if(!isNaN(val) && val !== "") el.value = Number(val).toLocaleString('en-US');
    }
    function unformat(str) { return parseFloat(str.toString().replace(/,/g, '')) || 0; }
    function nf(num) { return Number(num).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

    // --- Logic ---
    function addProject() {
        const name = document.getElementById('pName').value;
        const contractVat = unformat(document.getElementById('pContractVat').value);
        if(!name || !contractVat) return;
        const data = { 
            type: document.getElementById('pType').value,
            name, branch: document.getElementById('pBranch').value, dept: document.getElementById('pDept').value,
            contractVat, contractNoVat: contractVat / 1.07,
            costPercent: parseFloat(document.getElementById('pCostPercent').value),
            targetCost: (contractVat / 1.07) * (parseFloat(document.getElementById('pCostPercent').value) / 100),
            totalDist: parseFloat(document.getElementById('pTotalDist').value) || 0,
            routes: []
        };
        projects.push(data); save(); resetForm();
    }

    function updateProjectDetail(pi, field, val) {
        if (field === 'contractVat') {
            val = unformat(val);
            projects[pi].contractVat = val;
            projects[pi].contractNoVat = val / 1.07;
        } else if (field === 'costPercent' || field === 'totalDist') {
            val = parseFloat(val) || 0;
            projects[pi][field] = val;
        } else {
            projects[pi][field] = val;
        }
        projects[pi].targetCost = projects[pi].contractNoVat * (projects[pi].costPercent / 100);
        save();
    }

    function addRouteInline(pi) {
        const name = document.getElementById(`newRName-${pi}`).value;
        const dist = document.getElementById(`newRDist-${pi}`).value;
        if(!name) return;
        let budget = (projects[pi].totalDist > 0) ? (parseFloat(dist) / projects[pi].totalDist) * projects[pi].targetCost : 0;
        projects[pi].routes.push({ name, dist: parseFloat(dist), initialBudget: budget, p1SupVat: 0, p1EngVat: 0, status: routeStatuses[0], expenses: [] });
        save();
    }

    function updateRouteInfo(pi, ri, field, val) {
        if(field === 'dist') {
            val = parseFloat(val) || 0;
            projects[pi].routes[ri].dist = val;
            if(projects[pi].totalDist > 0) projects[pi].routes[ri].initialBudget = (val / projects[pi].totalDist) * projects[pi].targetCost;
        } else {
            projects[pi].routes[ri][field] = val;
        }
        save();
    }

    function updateP1(pi, ri, field, val) { projects[pi].routes[ri][field] = unformat(val); save(); }

    function addExpense(pi, ri) {
        const date = document.getElementById(`expDate-${pi}-${ri}`).value || new Date().toISOString().split('T')[0];
        const payee = document.getElementById(`payee-${pi}-${ri}`).value;
        const amt = unformat(document.getElementById(`amt-${pi}-${ri}`).value);
        if(amt > 0 && payee) {
            projects[pi].routes[ri].expenses.push({ date, cat: document.getElementById(`cat-${pi}-${ri}`).value, payee, amt, status: document.getElementById(`status-${pi}-${ri}`).value });
            save();
        }
    }

    function updateExp(pi, ri, ei, field, val) { if(field==='amt') val=unformat(val); projects[pi].routes[ri].expenses[ei][field]=val; save(); }

    function save() { localStorage.setItem('kvr_master_v21', JSON.stringify(projects)); render(); }
    function deleteProject(pi) { if(confirm("ลบโครงการ?")) { projects.splice(pi, 1); save(); } }
    function deleteExp(pi, ri, ei) { projects[pi].routes[ri].expenses.splice(ei, 1); save(); }
    function resetForm() { document.getElementById('pName').value = ''; document.getElementById('pContractVat').value = ''; }

    function render() {
        const list = document.getElementById('projectList');
        list.innerHTML = '';
        projects.forEach((p, pi) => {
            let totalSpent = 0;
            p.routes.forEach(r => r.expenses.forEach(e => totalSpent += e.amt));

            list.innerHTML += `
                <div class="card ${p.type==='openend'?'project-openend':'project-section'}">
                    <button class="btn-red" style="float:right; scale:0.7" onclick="deleteProject(${pi})">ลบโครงการ</button>
                    
                    <div style="display:flex; gap:10px; align-items:center; margin-bottom:15px;">
                        <input class="inline-input" style="font-size:20px; width:30%;" value="${p.name}" onchange="updateProjectDetail(${pi}, 'name', this.value)">
                        <select style="width:150px;" onchange="updateProjectDetail(${pi}, 'branch', this.value)">
                            ${branchOptions.map(b => `<option value="${b}" ${p.branch===b?'selected':''}>สาขา${b}</option>`).join('')}
                        </select>
                        <input class="inline-input" style="width:20%; color:var(--permit);" value="${p.dept}" onchange="updateProjectDetail(${pi}, 'dept', this.value)" placeholder="กองงาน">
                    </div>

                    <div class="summary-grid">
                        <div class="summary-item"><span class="label">รวม VAT</span><input class="inline-input" style="text-align:center;" value="${nf(p.contractVat)}" oninput="formatInput(this)" onchange="updateProjectDetail(${pi}, 'contractVat', this.value)"></div>
                        <div class="summary-item"><span class="label">No VAT</span><span class="val">${nf(p.contractNoVat)}</span></div>
                        <div class="summary-item"><span class="label">งบเป้าหมาย (%: <input type="number" value="${p.costPercent}" style="width:40px; border:none; background:none; text-align:center; font-weight:bold;" onchange="updateProjectDetail(${pi}, 'costPercent', this.value)">)</span><span class="val">${nf(p.targetCost)}</span></div>
                        <div class="summary-item"><span class="label">จ่ายสะสม</span><span class="val" style="color:var(--danger)">${nf(totalSpent)}</span></div>
                        <div class="summary-item"><span class="label">คงเหลือ</span><span class="val">${nf(p.targetCost - totalSpent)}</span></div>
                    </div>

                    ${p.routes.map((r, ri) => {
                        let curP1 = r.p1EngVat > 0 ? r.p1EngVat : r.p1SupVat;
                        let routeBudget = curP1 > 0 ? (curP1 / 1.07) * (p.costPercent / 100) : r.initialBudget;
                        const spent = r.expenses.reduce((s, e) => s + e.amt, 0);

                        return `
                            <div class="route-card">
                                <div style="display:grid; grid-template-columns: 2fr 1fr 1.5fr auto; gap:10px; align-items:end; margin-bottom:10px;">
                                    <div><span class="label">ชื่อเส้นทาง</span><input class="inline-input" value="${r.name}" onchange="updateRouteInfo(${pi}, ${ri}, 'name', this.value)"></div>
                                    <div><span class="label">ระยะทาง (ม.)</span><input class="inline-input" value="${r.dist}" onchange="updateRouteInfo(${pi}, ${ri}, 'dist', this.value)"></div>
                                    <div><span class="label">สถานะงาน (คลิกเปลี่ยนได้)</span><select onchange="updateRouteInfo(${pi}, ${ri}, 'status', this.value)">
                                        ${routeStatuses.map(s => `<option value="${s}" ${r.status===s?'selected':''}>${s}</option>`).join('')}
                                    </select></div>
                                    <button class="btn-red" style="scale:0.8" onclick="if(confirm('ลบซอย?')) {projects[${pi}].routes.splice(${ri},1); save();}">ลบซอย</button>
                                </div>

                                <div class="grid-p1-compare">
                                    <div><span class="label">P1 ช่าง</span><input class="inline-input" value="${nf(r.p1SupVat)}" oninput="formatInput(this)" onchange="updateP1(${pi}, ${ri}, 'p1SupVat', this.value)"></div>
                                    <div><span class="label" style="color:var(--permit)">P1 วิศวกร</span><input class="inline-input" value="${nf(r.p1EngVat)}" oninput="formatInput(this)" onchange="updateP1(${pi}, ${ri}, 'p1EngVat', this.value)"></div>
                                    <div><span class="label">งบประมาณ</span><span class="val">${nf(routeBudget)}</span></div>
                                    <div><span class="label">จ่ายจริง</span><span class="val">${nf(spent)}</span></div>
                                    <div><span class="label">คงเหลือซอย</span><span class="val" style="color:${(routeBudget-spent)<0?'red':'green'}">${nf(routeBudget-spent)}</span></div>
                                </div>
                                
                                <div style="display:grid; grid-template-columns: 1.2fr 1fr 1fr 1.5fr 1.2fr auto; gap:5px; background:#f9f9f9; padding:8px; border-radius:5px; align-items:end; margin-bottom:10px;">
                                    <div><input type="date" id="expDate-${pi}-${ri}"></div>
                                    <div><select id="cat-${pi}-${ri}">${categories.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>
                                    <div><input type="text" id="payee-${pi}-${ri}" placeholder="ผู้รับเงิน" onkeyup="if(event.key==='Enter') addExpense(${pi}, ${ri})"></div>
                                    <div><input type="text" id="amt-${pi}-${ri}" oninput="formatInput(this)" placeholder="จำนวน" onkeyup="if(event.key==='Enter') addExpense(${pi}, ${ri})"></div>
                                    <div><select id="status-${pi}-${ri}">${statuses.map(s => `<option value="${s}">${s}</option>`).join('')}</select></div>
                                    <button class="btn-blue" onclick="addExpense(${pi}, ${ri})">บันทึก</button>
                                </div>

                                <table class="exp-table">
                                    <tbody>${r.expenses.map((e, ei) => `
                                        <tr class="edit-row">
                                            <td><input type="date" value="${e.date}" onchange="updateExp(${pi}, ${ri}, ${ei}, 'date', this.value)"></td>
                                            <td><select onchange="updateExp(${pi}, ${ri}, ${ei}, 'cat', this.value)">${categories.map(c => `<option value="${c}" ${e.cat===c?'selected':''}>${c}</option>`).join('')}</select></td>
                                            <td><input type="text" value="${e.payee}" onchange="updateExp(${pi}, ${ri}, ${ei}, 'payee', this.value)"></td>
                                            <td><input type="text" value="${nf(e.amt)}" oninput="formatInput(this)" onchange="updateExp(${pi}, ${ri}, ${ei}, 'amt', this.value)" style="font-weight:bold; color:var(--primary)"></td>
                                            <td><select onchange="updateExp(${pi}, ${ri}, ${ei}, 'status', this.value)">${statuses.map(s => `<option value="${s}" ${e.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
                                            <td><button onclick="deleteExp(${pi}, ${ri}, ${ei})" style="color:red; border:none; background:none;">x</button></td>
                                        </tr>`).join('')}</tbody>
                                </table>
                            </div>
                        `;
                    }).join('')}
                    
                    <div style="background:#f0f7ff; padding:15px; border-radius:8px; margin-top:20px; display:grid; grid-template-columns: 2fr 1fr auto; gap:10px; align-items:end;">
                        <div><span class="label">ชื่อซอยใหม่</span><input type="text" id="newRName-${pi}" placeholder="ซอย..." onkeyup="if(event.key==='Enter') addRouteInline(${pi})"></div>
                        <div><span class="label">เมตร</span><input type="number" id="newRDist-${pi}" onkeyup="if(event.key==='Enter') addRouteInline(${pi})"></div>
                        <button class="btn-green" onclick="addRouteInline(${pi})">เพิ่มเส้นทาง</button>
                    </div>
                </div>
            `;
        });
    }
</script>
</body>
</html>
