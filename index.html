<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVRdevelopment - Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2980b9; --secondary: #27ae60; --danger: #e74c3c; --warning: #f39c12; --open-end: #e67e22; --bg: #f4f7f6; --dark: #2c3e50; --flow: #9b59b6; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; font-size: 13px; }
        .container { max-width: 1350px; margin: auto; display: none; }
        
        /* หน้า Login */
        #loginOverlay { position: fixed; inset: 0; background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); width: 350px; }
        .login-box h1 { color: var(--primary); margin-bottom: 5px; font-size: 24px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .project-section { border-left: 10px solid var(--primary); }
        .project-openend { border-left: 10px solid var(--open-end); }
        
        .grid-project-head { display: grid; grid-template-columns: 1fr 1fr 1fr 0.8fr 0.8fr auto; gap: 10px; margin-bottom: 15px; }
        .grid-p1-compare { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 10px; background: #fdfefe; padding: 12px; border-radius: 8px; margin: 10px 0; border: 1px solid #e0e6ed; }
        
        .label { font-size: 0.8em; color: #666; display: block; margin-bottom: 3px; }
        .val { font-weight: bold; color: var(--primary); display: block; }
        
        button { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--secondary); color: white; }
        .btn-red { background: var(--danger); color: white; }
        .btn-edit { background: #bdc3c7; color: #333; font-size: 11px; }
        
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: 'Sarabun'; width: 100%; box-sizing: border-box; }
        .summary-item { background: #eef2f7; padding: 12px; border-radius: 8px; text-align: center; }
        
        .route-card { border-radius: 8px; padding: 15px; margin-top: 15px; border: 1px solid #d1d8e0; background: #fff; position: relative; }
        .exp-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        .exp-table th { background: #f8f9fa; color: #555; padding: 10px; text-align: left; border-bottom: 2px solid #eee; }
        .exp-table td { padding: 10px; border-bottom: 1px solid #eee; }
        
        .status-prepare { color: var(--warning); font-weight: bold; }
        .status-paid { color: var(--secondary); font-weight: bold; }
        .status-flow { color: var(--flow); font-weight: bold; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h1>Hello KVRdevelopment</h1>
        <p>ระบุรหัสผ่านเพื่อเข้าใช้งาน</p>
        <input type="text" id="passInput" placeholder="ใส่ password" style="margin-bottom: 15px; text-align: center; font-weight: bold; color: var(--primary); font-size: 18px;">
        <button class="btn-blue" onclick="checkPass()" style="width: 100%; padding: 12px;">เข้าใช้งาน</button>
        <p id="errorMsg" style="color: var(--danger); font-size: 12px; margin-top: 10px; display: none;">รหัสผ่านไม่ถูกต้องค่ะคุณว่าน</p>
    </div>
</div>

<div class="container" id="mainContent">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h1 style="color: var(--dark);">🏗️ KVRdevelopment Management</h1>
        <button onclick="location.reload()" style="background:#7f8c8d; color:white;">ออกจากระบบ</button>
    </div>

    <div class="card" id="projectFormContainer">
        <h3 id="formTitle">➕ เริ่มโครงการใหม่</h3>
        <div class="grid-project-head">
            <input type="hidden" id="editIdx" value="-1">
            <div><span class="label">ประเภทงาน</span><select id="pType"><option value="normal">งานปกติ</option><option value="openend">งาน Open-end</option></select></div>
            <div><span class="label">ชื่อโครงการ</span><input type="text" id="pName" placeholder="ระบุชื่อโครงการ"></div>
            <div><span class="label">สัญญา (รวม VAT)</span><input type="number" id="pContractVat" placeholder="บาท"></div>
            <div><span class="label">% ต้นทุนเป้าหมาย</span><input type="number" id="pCostPercent" value="70"></div>
            <div><span class="label">ระยะรวม (เมตร)</span><input type="number" id="pTotalDist" placeholder="เมตร"></div>
            <div style="align-self: end;">
                <button class="btn-blue" id="btnSubmitProject" onclick="addOrUpdateProject()">สร้างโครงการ</button>
                <button class="btn-red" id="btnCancelEdit" onclick="resetProjectForm()" style="display:none; margin-left:5px;">ยกเลิก</button>
            </div>
        </div>
    </div>

    <div id="projectList"></div>
</div>

<script>
    const SECRET_PASS = "kvradmin";
    const categories = ["ค่าแรง", "ค่าคอนกรีต", "ค่า asbuilt", "ค่าช่างคุมงาน", "ค่า ผจ.", "ค่า Food support", "ค่าตรวจรับงาน"];
    const statuses = ["เตรียมจ่าย", "จ่ายแล้ว", "บันทึกลง flowaccount แล้ว"];
    
    let projects = JSON.parse(localStorage.getItem('kvrFinal_v3')) || [];

    function checkPass() {
        const input = document.getElementById('passInput').value;
        if(input === SECRET_PASS) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            render();
        } else { document.getElementById('errorMsg').style.display = 'block'; }
    }

    function addOrUpdateProject() {
        const idx = parseInt(document.getElementById('editIdx').value);
        const type = document.getElementById('pType').value;
        const name = document.getElementById('pName').value;
        const contractVat = parseFloat(document.getElementById('pContractVat').value);
        const costPercent = parseFloat(document.getElementById('pCostPercent').value);
        const totalDist = parseFloat(document.getElementById('pTotalDist').value) || 0;

        if(!name || !contractVat) return alert("กรุณากรอกชื่อโครงการและราคาสัญญาค่ะ");

        const data = { 
            type, name, contractVat, contractNoVat: contractVat / 1.07, 
            costPercent, targetCost: (contractVat / 1.07) * (costPercent / 100), 
            totalDist, routes: idx === -1 ? [] : projects[idx].routes 
        };

        if(idx === -1) projects.push(data);
        else projects[idx] = data;

        save();
        resetProjectForm();
    }

    function editProject(idx) {
        const p = projects[idx];
        document.getElementById('editIdx').value = idx;
        document.getElementById('pType').value = p.type;
        document.getElementById('pName').value = p.name;
        document.getElementById('pContractVat').value = p.contractVat;
        document.getElementById('pCostPercent').value = p.costPercent;
        document.getElementById('pTotalDist').value = p.totalDist;
        document.getElementById('formTitle').innerText = "📝 แก้ไขรายละเอียดโครงการ";
        document.getElementById('btnSubmitProject').innerText = "บันทึกการแก้ไข";
        document.getElementById('btnCancelEdit').style.display = "inline-block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetProjectForm() {
        document.getElementById('editIdx').value = "-1";
        document.getElementById('pName').value = '';
        document.getElementById('pContractVat').value = '';
        document.getElementById('formTitle').innerText = "➕ เริ่มโครงการใหม่";
        document.getElementById('btnSubmitProject').innerText = "สร้างโครงการ";
        document.getElementById('btnCancelEdit').style.display = "none";
    }

    function addRoute(pIdx) {
        const name = prompt("ชื่อเส้นทางใหม่:");
        const dist = parseFloat(prompt("ระยะทาง (เมตร):")) || 0;
        if(name) {
            let budget = (projects[pIdx].type === 'normal') ? (dist / projects[pIdx].totalDist) * projects[pIdx].targetCost : 0;
            projects[pIdx].routes.push({ name, dist, initialBudget: budget, p1SupVat: 0, p1EngVat: 0, expenses: [] });
            save();
        }
    }

    function editRoute(pIdx, rIdx) {
        const r = projects[pIdx].routes[rIdx];
        const newName = prompt("แก้ไขชื่อเส้นทาง:", r.name);
        const newDist = prompt("แก้ไขระยะทาง (เมตร):", r.dist);
        if(newName !== null) {
            projects[pIdx].routes[rIdx].name = newName;
            projects[pIdx].routes[rIdx].dist = parseFloat(newDist) || 0;
            if(projects[pIdx].type === 'normal') {
                projects[pIdx].routes[rIdx].initialBudget = (projects[pIdx].routes[rIdx].dist / projects[pIdx].totalDist) * projects[pIdx].targetCost;
            }
            save();
        }
    }

    function updateP1(pIdx, rIdx, field, val) { projects[pIdx].routes[rIdx][field] = parseFloat(val) || 0; save(); }

    function addExpense(pIdx, rIdx) {
        const cat = document.getElementById(`cat-${pIdx}-${rIdx}`).value;
        const payee = document.getElementById(`payee-${pIdx}-${rIdx}`).value;
        const amt = parseFloat(document.getElementById(`amt-${pIdx}-${rIdx}`).value);
        const status = document.getElementById(`status-${pIdx}-${rIdx}`).value;
        if(amt > 0 && payee) {
            projects[pIdx].routes[rIdx].expenses.push({ cat, payee, amt, status, date: new Date().toLocaleDateString() });
            save();
        }
    }

    function updateExpStatus(pIdx, rIdx, eIdx, newStatus) {
        projects[pIdx].routes[rIdx].expenses[eIdx].status = newStatus;
        save();
    }

    function deleteExpense(pIdx, rIdx, eIdx) {
        if(confirm("ลบรายการจ่ายนี้?")) { projects[pIdx].routes[rIdx].expenses.splice(eIdx, 1); save(); }
    }

    function deleteProject(idx) { if(confirm("ลบโครงการ?")) { projects.splice(idx, 1); save(); } }
    function save() { localStorage.setItem('kvrFinal_v3', JSON.stringify(projects)); render(); }

    function render() {
        const list = document.getElementById('projectList');
        list.innerHTML = '';
        projects.forEach((p, pi) => {
            const isOE = p.type === 'openend';
            let totalSpent = 0;
            p.routes.forEach(r => r.expenses.forEach(e => totalSpent += e.amt));

            list.innerHTML += `
                <div class="card ${isOE ? 'project-openend' : 'project-section'}">
                    <button class="btn-red" style="float:right; scale:0.7" onclick="deleteProject(${pi})">ลบโครงการ</button>
                    <button class="btn-edit" style="float:right; scale:0.7; margin-right:5px;" onclick="editProject(${pi})">แก้ไขรายละเอียด</button>
                    <h2 style="margin:0;">${p.name}</h2>

                    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:15px; margin: 15px 0;">
                        <div class="summary-item"><span class="label">งบเป้าหมายรวม</span><span class="val">${p.targetCost.toLocaleString()}</span></div>
                        <div class="summary-item"><span class="label">ระยะทางรวม</span><span class="val">${p.totalDist} ม.</span></div>
                        <div class="summary-item"><span class="label">จ่ายจริงสะสม</span><span class="val" style="color:var(--danger)">${totalSpent.toLocaleString()}</span></div>
                        <div class="summary-item"><span class="label">คงเหลืองบโครงการ</span><span class="val">${(p.targetCost - totalSpent).toLocaleString()}</span></div>
                    </div>

                    <button class="btn-blue" onclick="addRoute(${pi})">+ เพิ่มเส้นทาง</button>

                    ${p.routes.map((r, ri) => {
                        let activeBudget = r.initialBudget;
                        if (r.p1EngVat > 0) activeBudget = (r.p1EngVat / 1.07) * (p.costPercent / 100);
                        else if (r.p1SupVat > 0) activeBudget = (r.p1SupVat / 1.07) * (p.costPercent / 100);
                        const rSpent = r.expenses.reduce((s, e) => s + e.amt, 0);

                        return `
                            <div class="route-card">
                                <button class="btn-edit" style="position:absolute; top:10px; right:10px; scale:0.7" onclick="editRoute(${pi}, ${ri})">แก้ชื่อ/เมตร</button>
                                <h4>📍 ${r.name} (${r.dist} ม.)</h4>
                                <div class="grid-p1-compare">
                                    <div><span class="label">P1 ช่าง</span><input type="number" value="${r.p1SupVat||''}" onchange="updateP1(${pi}, ${ri}, 'p1SupVat', this.value)"></div>
                                    <div><span class="label" style="color:#8e44ad">P1 วิศวกร (Final)</span><input type="number" value="${r.p1EngVat||''}" onchange="updateP1(${pi}, ${ri}, 'p1EngVat', this.value)" style="border:1px solid #8e44ad"></div>
                                    <div><span class="label">งบเป้าหมาย</span><span class="val">${activeBudget.toLocaleString()}</span></div>
                                    <div><span class="label">คงเหลือ</span><span class="val" style="color:${(activeBudget-rSpent)<0?'red':'green'}">${(activeBudget-rSpent).toLocaleString()}</span></div>
                                </div>
                                
                                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1.5fr auto; gap:5px; background:#f9f9f9; padding:10px; border-radius:5px;">
                                    <select id="cat-${pi}-${ri}">${categories.map(c => `<option value="${c}">${c}</option>`).join('')}</select>
                                    <input type="text" id="payee-${pi}-${ri}" placeholder="ผู้รับเงิน">
                                    <input type="number" id="amt-${pi}-${ri}" placeholder="จำนวน">
                                    <select id="status-${pi}-${ri}">${statuses.map(s => `<option value="${s}">${s}</option>`).join('')}</select>
                                    <button class="btn-blue" onclick="addExpense(${pi}, ${ri})">บันทึก</button>
                                </div>

                                <table class="exp-table">
                                    <thead><tr><th>วันที่</th><th>หมวด</th><th>ผู้รับเงิน</th><th>จำนวน</th><th>สถานะ</th><th></th></tr></thead>
                                    <tbody>
                                        ${r.expenses.map((e, ei) => `
                                            <tr>
                                                <td>${e.date}</td><td>${e.cat}</td><td>${e.payee}</td><td><b>${e.amt.toLocaleString()}</b></td>
                                                <td>
                                                    <select onchange="updateExpStatus(${pi}, ${ri}, ${ei}, this.value)" 
                                                        class="${e.status === statuses[0] ? 'status-prepare' : e.status === statuses[1] ? 'status-paid' : 'status-flow'}">
                                                        ${statuses.map(s => `<option value="${s}" ${e.status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                                    </select>
                                                </td>
                                                <td><button class="btn-red" style="padding:2px 8px; font-size:10px;" onclick="deleteExpense(${pi}, ${ri}, ${ei})">ลบ</button></td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        });
    }

    document.getElementById("passInput").addEventListener("keyup", (e) => { if(e.key === "Enter") checkPass(); });
</script>
</body>
</html>
